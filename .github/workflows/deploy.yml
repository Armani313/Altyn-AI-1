name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.VPS_PORT }} ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Sync files to server
        run: |
          rsync -azv --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='.next' \
            --exclude='.env' \
            --exclude='.env.local' \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT }}" \
            ./ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/home/ubuntu/luminify/

      - name: Build & restart container
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.VPS_PORT }}
          command_timeout: 10m
          script: |
            set -e
            cd /home/ubuntu/luminify

            # Save current image as rollback target before building
            if docker image inspect luminify:latest &>/dev/null; then
              docker tag luminify:latest luminify:rollback
              echo "Rollback snapshot saved"
            fi

            docker compose build --no-cache
            docker compose up -d
            docker builder prune -af

      - name: Health check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            sleep 10
            if ! curl -sf http://127.0.0.1:3000/api/health; then
              echo "Health check FAILED — rolling back to previous image"
              cd /home/ubuntu/luminify
              if docker image inspect luminify:rollback &>/dev/null; then
                docker tag luminify:rollback luminify:latest
                docker compose up -d --force-recreate
                sleep 8
                if curl -sf http://127.0.0.1:3000/api/health; then
                  echo "Rollback successful"
                else
                  echo "Rollback also failed — manual intervention required"
                fi
              else
                echo "No rollback image available"
              fi
              exit 1
            fi
            echo "Health check passed"
