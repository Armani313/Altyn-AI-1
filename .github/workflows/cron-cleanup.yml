name: Daily Cleanup

on:
  schedule:
    # Every day at 03:00 UTC (06:00 Almaty time, UTC+3)
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (just show what would be deleted)'
        required: false
        default: 'false'

jobs:
  cleanup:
    name: Cleanup old generations
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Run cleanup
        id: cleanup
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "${{ secrets.APP_URL }}/api/cron/cleanup" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 90)

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "status=$HTTP_CODE" >> $GITHUB_OUTPUT
          echo "body=$BODY" >> $GITHUB_OUTPUT
          echo "HTTP $HTTP_CODE: $BODY"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "Cleanup failed with status $HTTP_CODE"
            exit 1
          fi

      - name: Summary
        if: always()
        run: |
          echo "### Cleanup Result" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`json" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.cleanup.outputs.body }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
