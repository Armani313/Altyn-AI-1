name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: "."
          target: "/home/ubuntu/nurai-ai-studio"
          rm: false
          exclude: ".git,.github,node_modules,.next,.env*"

      - name: Build & restart container
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e
            cd /home/ubuntu/nurai-ai-studio

            # Save current image as rollback target before building
            if docker image inspect nurai-ai-studio:latest &>/dev/null; then
              docker tag nurai-ai-studio:latest nurai-ai-studio:rollback
              echo "Rollback snapshot saved"
            fi

            docker compose build --no-cache
            docker compose up -d
            docker builder prune -af

      - name: Health check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            sleep 10
            if ! curl -sf http://127.0.0.1:3000/api/health; then
              echo "Health check FAILED — rolling back to previous image"
              cd /home/ubuntu/nurai-ai-studio
              if docker image inspect nurai-ai-studio:rollback &>/dev/null; then
                docker tag nurai-ai-studio:rollback nurai-ai-studio:latest
                docker compose up -d --force-recreate
                sleep 8
                if curl -sf http://127.0.0.1:3000/api/health; then
                  echo "Rollback successful"
                else
                  echo "Rollback also failed — manual intervention required"
                fi
              else
                echo "No rollback image available"
              fi
              exit 1
            fi
            echo "Health check passed"
