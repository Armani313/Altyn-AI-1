name: Daily Cleanup

on:
  schedule:
    # Every day at 03:00 UTC (09:00 Almaty, UTC+6)
    - cron: '0 3 * * *'
  workflow_dispatch: {}

jobs:
  cleanup:
    name: Cleanup old generations
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout scripts
        uses: actions/checkout@v4
        with:
          sparse-checkout: .github/scripts
          sparse-checkout-cone-mode: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install supabase-js
        run: npm install @supabase/supabase-js@2

      - name: Run cleanup
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          CLEANUP_RETENTION_DAYS: '15'
        run: node .github/scripts/cleanup.mjs
