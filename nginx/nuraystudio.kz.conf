# ── Redirect HTTP → HTTPS ────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name nuraystudio.kz www.nuraystudio.kz;

    # Let's Encrypt ACME challenge (certbot webroot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://nuraystudio.kz$request_uri;
    }
}

# ── Redirect www → non-www (HTTPS) ───────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name www.nuraystudio.kz;

    ssl_certificate     /etc/letsencrypt/live/nuraystudio.kz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nuraystudio.kz/privkey.pem;

    return 301 https://nuraystudio.kz$request_uri;
}

# ── Main HTTPS server ─────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name nuraystudio.kz;

    # ── TLS ─────────────────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/nuraystudio.kz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nuraystudio.kz/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/nuraystudio.kz/chain.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP Stapling
    ssl_stapling        on;
    ssl_stapling_verify on;
    resolver            1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout    5s;

    # ── Security headers (complement Next.js headers) ────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "DENY" always;

    # ── Request limits ───────────────────────────────────────────────────────
    client_max_body_size 12m;   # slightly above our 10 MB app limit
    client_body_timeout  60s;
    client_header_timeout 10s;

    # ── Rate limiting zones (defined in nginx.conf http block) ───────────────
    limit_req zone=api burst=10 nodelay;
    limit_req zone=general burst=30 nodelay;

    # ── Proxy to Docker app ──────────────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";

        proxy_read_timeout  90s;
        proxy_connect_timeout 10s;
        proxy_send_timeout  90s;

        proxy_buffering     off;
    }

    # ── Static assets — long cache via Next.js content hashes ───────────────
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # ── Block common scanners / bad bots ────────────────────────────────────
    location ~* \.(php|asp|aspx|jsp|cgi|env|git|svn|htaccess)$ {
        return 444;
    }

    # ── Gzip compression ─────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss image/svg+xml;

    # ── Logging ──────────────────────────────────────────────────────────────
    access_log /var/log/nginx/nuraystudio.access.log;
    error_log  /var/log/nginx/nuraystudio.error.log warn;
}
