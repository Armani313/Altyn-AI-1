name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    env:
      NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL }}
      TOPAZ_API_KEY: ${{ secrets.TOPAZ_API_KEY }}
      POLAR_ENVIRONMENT: ${{ secrets.POLAR_ENVIRONMENT }}
      POLAR_PRODUCT_ID_TOPUP_25: ${{ secrets.POLAR_PRODUCT_ID_TOPUP_25 }}
      POLAR_PRODUCT_ID_TOPUP_100: ${{ secrets.POLAR_PRODUCT_ID_TOPUP_100 }}
      POLAR_PRODUCT_ID_TOPUP_250: ${{ secrets.POLAR_PRODUCT_ID_TOPUP_250 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20 (matches Docker build image)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Validate lockfile
        run: |
          node scripts/check-lockfile.mjs
          npm ci --legacy-peer-deps --ignore-scripts

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.VPS_PORT }} ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Pre-flight cleanup on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e
            echo "=== Disk before cleanup ==="
            df -h /

            # Build cache is the main offender — accumulates ~18GB between cleanups
            docker builder prune -af || true
            # Stopped containers and dangling images (keeps tagged rollback image)
            docker container prune -f || true
            docker image prune -f || true
            # Truncate runaway container logs
            for cid in $(docker ps -q); do
              logpath=$(docker inspect --format='{{.LogPath}}' "$cid" 2>/dev/null || true)
              if [ -n "$logpath" ] && [ -f "$logpath" ]; then
                sudo truncate -s 0 "$logpath" || true
              fi
            done
            # Journal logs cap
            sudo journalctl --vacuum-size=200M || true

            echo "=== Disk after cleanup ==="
            df -h /

            # Hard guard: abort early if still under 5GB free
            avail_kb=$(df -P / | awk 'NR==2{print $4}')
            if [ "$avail_kb" -lt 5242880 ]; then
              echo "ERROR: less than 5GB free after cleanup — aborting before rsync"
              exit 1
            fi

      - name: Sync files to server
        run: |
          rsync -azv --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='.next' \
            --exclude='.env' \
            --exclude='.env.local' \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT }}" \
            ./ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/home/ubuntu/luminify/

      - name: Sync managed production env vars
        uses: appleboy/ssh-action@v1.0.3
        env:
          NEXT_PUBLIC_APP_URL: ${{ env.NEXT_PUBLIC_APP_URL }}
          TOPAZ_API_KEY: ${{ env.TOPAZ_API_KEY }}
          POLAR_ENVIRONMENT: ${{ env.POLAR_ENVIRONMENT }}
          POLAR_PRODUCT_ID_TOPUP_25: ${{ env.POLAR_PRODUCT_ID_TOPUP_25 }}
          POLAR_PRODUCT_ID_TOPUP_100: ${{ env.POLAR_PRODUCT_ID_TOPUP_100 }}
          POLAR_PRODUCT_ID_TOPUP_250: ${{ env.POLAR_PRODUCT_ID_TOPUP_250 }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.VPS_PORT }}
          envs: NEXT_PUBLIC_APP_URL,TOPAZ_API_KEY,POLAR_ENVIRONMENT,POLAR_PRODUCT_ID_TOPUP_25,POLAR_PRODUCT_ID_TOPUP_100,POLAR_PRODUCT_ID_TOPUP_250
          script: |
            set -e
            cd /home/ubuntu/luminify
            touch .env

            upsert_env() {
              key="$1"
              value="$2"
              tmp_file="$(mktemp)"
              awk -v key="$key" -v value="$value" '
                BEGIN { updated = 0 }
                index($0, key "=") == 1 { print key "=" value; updated = 1; next }
                { print }
                END { if (!updated) print key "=" value }
              ' .env > "$tmp_file"
              mv "$tmp_file" .env
            }

            upsert_env NEXT_PUBLIC_APP_URL "$NEXT_PUBLIC_APP_URL"
            upsert_env TOPAZ_API_KEY "$TOPAZ_API_KEY"
            upsert_env POLAR_ENVIRONMENT "$POLAR_ENVIRONMENT"
            upsert_env POLAR_PRODUCT_ID_TOPUP_25 "$POLAR_PRODUCT_ID_TOPUP_25"
            upsert_env POLAR_PRODUCT_ID_TOPUP_100 "$POLAR_PRODUCT_ID_TOPUP_100"
            upsert_env POLAR_PRODUCT_ID_TOPUP_250 "$POLAR_PRODUCT_ID_TOPUP_250"

      - name: Build & restart container
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.VPS_PORT }}
          command_timeout: 20m
          script: |
            set -e
            cd /home/ubuntu/luminify

            # Save current image as rollback target before building
            if docker image inspect luminify:latest &>/dev/null; then
              docker tag luminify:latest luminify:rollback
              echo "Rollback snapshot saved"
            fi

            docker compose build --no-cache
            docker compose up -d
            docker builder prune -af

      - name: Health check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            sleep 10
            if ! curl -sf http://127.0.0.1:3000/api/health; then
              echo "Health check FAILED — rolling back to previous image"
              cd /home/ubuntu/luminify
              if docker image inspect luminify:rollback &>/dev/null; then
                docker tag luminify:rollback luminify:latest
                docker compose up -d --force-recreate
                sleep 8
                if curl -sf http://127.0.0.1:3000/api/health; then
                  echo "Rollback successful"
                else
                  echo "Rollback also failed — manual intervention required"
                fi
              else
                echo "No rollback image available"
              fi
              exit 1
            fi
            echo "Health check passed"
